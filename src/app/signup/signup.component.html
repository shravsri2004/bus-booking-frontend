<div class="signup-page">

  <!-- 🌄 FULL WIDTH BANNER -->
  <div class="header-img">
    <img src="assets/signupbanner.png" alt="Travel Banner">
  </div>

  <!-- 🧾 CENTERED FORM -->
  <div class="signup-container">
    <div class="signup-card">

      <h2 class="title">🚌 Bus Booking </h2>
      <h3 class="subtitle">Create Account</h3>

      <form (ngSubmit)="doSignUp()">

        <input type="text" placeholder="Name" name="name"
          [(ngModel)]="signupData.name" required>

        <input type="text" placeholder="Username" name="userName"
          [(ngModel)]="signupData.userName" required>

        <input type="tel" placeholder="Phone Number" name="phoneNo"
          [(ngModel)]="signupData.phoneNo" required>

        <input type="password" placeholder="Password" name="password"
          [(ngModel)]="signupData.password" required>

        <button type="submit">Sign Up</button>
      </form>

      <p class="error" *ngIf="errmsg">{{ errmsg }}</p>

      <p class="login-link">
        Already have an account? <a routerLink="/login">Login</a>
      </p>

    </div>
  </div>

</div>
