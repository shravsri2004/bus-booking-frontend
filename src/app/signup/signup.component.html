<div style="
  height: 70vh;
  display: flex;
  justify-content: center;
  align-items: center;
">

  <div style="
    width: 350px;
    padding: 25px;
    border-radius: 15px;
    background: #ffffffcc;
    box-shadow: 0 8px 20px rgba(0,0,0,0.1);
    text-align: center;
  ">


    <h2 style="color:#6c63ff;">Bus Booking System</h2>

    <h3 style="color:#555;">Sign Up</h3>

   <form (ngSubmit)="doSignUp()">

  <input type="text" placeholder="Name" name="name"
    [(ngModel)]="signupData.name"
    required
    style="width:100%; padding:10px; margin:8px 0; border-radius:8px; border:1px solid #ddd;"><br>

  <input type="text" placeholder="Username" name="userName"
    [(ngModel)]="signupData.userName"
    required
    style="width:100%; padding:10px; margin:8px 0; border-radius:8px; border:1px solid #ddd;"><br>

  <input type="tel" placeholder="Phone Number" name="phoneNo"
    [(ngModel)]="signupData.phoneNo"
    required
    style="width:100%; padding:10px; margin:8px 0; border-radius:8px; border:1px solid #ddd;"><br>

  <input type="password" placeholder="Password" name="password"
    [(ngModel)]="signupData.password"
    required
    style="width:100%; padding:10px; margin:8px 0; border-radius:8px; border:1px solid #ddd;"><br>

  <button type="submit"
    style="width:100%; padding:10px; background:#6c63ff; color:white; border:none; border-radius:8px;">
    Sign Up
  </button>

</form>

<!-- ✅ Error message -->
<p class="text-danger mt-2" *ngIf="errmsg">
  {{ errmsg }}
</p>
