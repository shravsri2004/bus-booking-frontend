<!-- bookpage.component.html -->

<div style="min-height:100vh; background:linear-gradient(to right,#e8b6d8,#bcccf8);">

    <!-- HEADER -->
    <div style="
    display:flex;
    justify-content:center;
    align-items:center;
    padding:25px;
    color:white;
    font-size:38px;
    font-weight:bold;
    ">
        Bus Booking Management System
    </div>


    <!-- HERO IMAGE SECTION -->
    <div style="
    position:relative;
    height:420px;
    background-image:url('src/assets/bus2.jpg');
    background-size:cover;
    background-position:center;
    border-radius:0 0 35px 35px;
    ">

        <!-- DARK OVERLAY -->
        <div style="
        position:absolute;
        inset:0;
        background:rgba(0,0,0,0.45);
        border-radius:0 0 35px 35px;
        "></div>


        <!-- TITLE -->
        <div style="
        position:relative;
        z-index:2;
        text-align:center;
        padding-top:120px;
        color:white;
        ">

            <h1 style="
            font-size:60px;
            margin:0;
            font-weight:bold;">
                Booking Page
            </h1>

        </div>


        <!-- SEARCH BOX -->
        <div style="
        position:absolute;
        bottom:-70px;
        left:50%;
        transform:translateX(-50%);
        width:90%;
        max-width:1000px;
        background:white;
        border-radius:25px;
        padding:30px;
        box-shadow:0 10px 30px rgba(0,0,0,0.15);
        z-index:5;
        ">

            <div style="
            display:flex;
            gap:20px;
            align-items:center;
            ">

                <div style="flex:1;">
                    <label style="display:block; color:gray; margin-bottom:8px;">Source</label>
                    <input type="text" placeholder="Enter source city"
                    style="width:100%; padding:14px; border:1px solid #ccc; border-radius:10px;">
                </div>


                <div style="flex:1;">
                    <label style="display:block; color:gray; margin-bottom:8px;">Destination</label>
                    <input type="text" placeholder="Enter destination city"
                    style="width:100%; padding:14px; border:1px solid #ccc; border-radius:10px;">
                </div>


                <div style="flex:1;">
                    <label style="display:block; color:gray; margin-bottom:8px;">Date</label>
                    <input type="date"
                    style="width:100%; padding:14px; border:1px solid #ccc; border-radius:10px;">
                </div>


                <div>
                    <button style="
                    margin-top:26px;
                    background:#5a4fcf;
                    color:white;
                    border:none;
                    padding:15px 35px;
                    font-size:18px;
                    border-radius:12px;
                    cursor:pointer;
                    ">
                        Search
                    </button>
                </div>

            </div>

        </div>

    </div>

</div>
