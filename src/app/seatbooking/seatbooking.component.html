<div class="booking-container">
  <h2>🚌 Bus Seat Booking</h2>

  <div class="bus-box">

    <div class="driver">Driver</div>

    <div class="seats-container">

      <div *ngFor="let row of seats" class="seat-row">

        <!-- Left seats -->
        <div class="seat-group">
          <div *ngFor="let seat of row.slice(0,2)"
            (click)="selectSeat(seat.number)"
            [ngClass]="
              bookedSeats.includes(seat.number) ? 'booked' :
              selectedSeats.includes(seat.number) ? 'selected' : 'seat'
            "
            class="seat-box">
            {{seat.number}}
          </div>
        </div>

        <!-- Gap -->
        <div class="aisle"></div>

        <!-- Right seats -->
        <div class="seat-group">
          <div *ngFor="let seat of row.slice(2,4)"
            (click)="selectSeat(seat.number)"
            [ngClass]="
              bookedSeats.includes(seat.number) ? 'booked' :
              selectedSeats.includes(seat.number) ? 'selected' : 'seat'
            "
            class="seat-box">
            {{seat.number}}
          </div>
        </div>

      </div>

    </div>

    <div class="btns">
<button class="book-btn"
  (click)="bookSeats()"
  [disabled]="selectedSeats.length === 0">
  Book
</button>

<button class="clear-btn"
  (click)="clearSeats()">
  Clear
</button>
    </div>

  </div>
</div>
