<div style="
  width: 350px;
  padding: 25px;
  border-radius: 15px;
  background: #ffffffcc;
  box-shadow: 0 8px 20px rgba(0,0,0,0.1);
  text-align: center;
">

  <h1 style="color:#ff7eb3;">Welcome Back</h1>
  <h3 style="color:#555;">Login</h3>

  <form>
    <input type="email" placeholder="Email" 
      style="width:100%; padding:10px; margin:8px 0; border-radius:8px; border:1px solid #ddd;"><br>

    <input type="password" placeholder="Password" 
      style="width:100%; padding:10px; margin:8px 0; border-radius:8px; border:1px solid #ddd;"><br>

    <button style="
      width:100%;
      padding:10px;
      background:#ff7eb3;
      color:white;
      border:none;
      border-radius:8px;
      cursor:pointer;
    ">
      Login
    </button>
  </form>

  <p style="margin-top:10px;">
    Don't have an account?
    <a routerLink="/" style="color:#ff7eb3;">Sign Up</a>
  </p>

</div>
