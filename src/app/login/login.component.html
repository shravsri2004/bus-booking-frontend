<div class="login-page d-flex justify-content-center align-items-center">
  <div class="login-card text-center p-2">
    <h1 class="text-primary fw-bold">Welcome Back</h1>
    <h5 class="text-muted mb-3">Login</h5>

    <form (ngSubmit)="onLogin()" #frm="ngForm">
      <!-- Username -->
      <input
        type="text"
        class="form-control mb-2"
        placeholder="Username"
        name="username"
        #uname="ngModel"
        [(ngModel)]="loginData.username"
        required
      />
      <div *ngIf="uname.invalid && uname.touched" class="text-danger small">
        Username is required
      </div>

      <!-- Password -->
      <input
        type="password"
        class="form-control mb-2"
        placeholder="Password"
        name="password"
        #pwd="ngModel"
        [(ngModel)]="loginData.password"
        required
      />
      <div *ngIf="pwd.invalid && pwd.touched" class="text-danger small">
        Password is required
      </div>

      <!-- Login Button -->
      <button type="submit" class="btn btn-primary w-100 mt-2">Login</button>
    </form>

    <!-- Error -->
    <p class="text-danger mt-2" *ngIf="errmsg">
      {{ errmsg }}
    </p>

    <!-- Signup -->
    <p class="mt-3">
      Don't have an account?
      <a routerLink="/signup" class="btn btn-primary rounded-pill mt-1 px-3">
        Sign Up
      </a>
    </p>
  </div>
</div>
